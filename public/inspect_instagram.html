<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inspect Instagram Images</title>
  <style>
    body { font-family: sans-serif; background: #222; color: #fff; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .card { border: 1px solid #444; padding: 10px; border-radius: 8px; background: #333; }
    img { width: 100%; height: auto; display: block; border-radius: 4px; }
    .label { margin-top: 10px; font-weight: bold; text-align: center; }
  </style>
</head>
<body>
  <h1>Inspect Instagram Images</h1>
  <div class="grid">
    <div class="card">
      <img src="/instagram/instagram-image-1.jpg" alt="1">
      <div class="label">instagram-image-1.jpg</div>
    </div>
    <div class="card">
      <img src="/instagram/instagram-image-2.jpg" alt="2">
      <div class="label">instagram-image-2.jpg</div>
    </div>
    <div class="card">
      <img src="/instagram/instagram-image-3.jpg" alt="3">
      <div class="label">instagram-image-3.jpg</div>
    </div>
    <div class="card">
      <img src="/instagram/instagram-image-4.jpg" alt="4">
      <div class="label">instagram-image-4.jpg</div>
    </div>
  </div>
</body>
</html>
