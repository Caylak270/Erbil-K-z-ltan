<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inspect Images</title>
  <style>
    body { font-family: sans-serif; background: #222; color: #fff; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .card { border: 1px solid #444; padding: 10px; border-radius: 8px; background: #333; }
    img, video { width: 100%; height: auto; display: block; border-radius: 4px; }
    .label { margin-top: 10px; font-weight: bold; text-align: center; }
  </style>
</head>
<body>
  <h1>Inspect Celebrity Images</h1>
  <div class="grid">
    <div class="card">
      <img src="/unluler/unluler-image-1.jpg" alt="1">
      <div class="label">unluler-image-1.jpg</div>
    </div>
    <div class="card">
      <img src="/unluler/unluler-image-2.jpg" alt="2">
      <div class="label">unluler-image-2.jpg</div>
    </div>
    <div class="card">
      <img src="/unluler/unluler-image-3.jpeg" alt="3">
      <div class="label">unluler-image-3.jpeg</div>
    </div>
    <div class="card">
      <img src="/unluler/unluler-image-4.jpeg" alt="4">
      <div class="label">unluler-image-4.jpeg</div>
    </div>
    <div class="card">
      <img src="/unluler/unluler-image-5.jpeg" alt="5">
      <div class="label">unluler-image-5.jpeg</div>
    </div>
    <div class="card">
      <img src="/unluler/unluler-image-6.jpeg" alt="6">
      <div class="label">unluler-image-6.jpeg</div>
    </div>
    <div class="card">
      <img src="/unluler/unluler-image-7.jpeg" alt="7">
      <div class="label">unluler-image-7.jpeg</div>
    </div>
    <div class="card">
      <img src="/unluler/unluler-image-8.jpeg" alt="8">
      <div class="label">unluler-image-8.jpeg</div>
    </div>
    <div class="card">
      <img src="/unluler/unluler-image-9.jpeg" alt="9">
      <div class="label">unluler-image-9.jpeg</div>
    </div>
    <div class="card">
      <img src="/unluler/unluler-image-10.jpeg" alt="10">
      <div class="label">unluler-image-10.jpeg</div>
    </div>
    <div class="card">
      <video src="/unluler/unluler-video-1.mp4" controls muted autoplay></video>
      <div class="label">unluler-video-1.mp4</div>
    </div>
    <div class="card">
      <video src="/unluler/unluler-video-2.mp4" controls muted autoplay></video>
      <div class="label">unluler-video-2.mp4</div>
    </div>
  </div>
</body>
</html>
